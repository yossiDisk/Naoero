<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naoero - פורטל משחקים</title>
    <!-- חיבור לפונט איכותי ואייקונים -->
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--bg-gradient);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: var(--primary-color);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 35px;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .game-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .game-desc {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .coming-soon {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .coming-soon .icon-wrapper {
            background: #4b5563;
            box-shadow: none;
        }

        .btn {
            background: white;
            color: var(--secondary-color);
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            transition: scale 0.2s;
        }

        .game-card:hover .btn {
            scale: 1.1;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NAOERO</h1>
        <p>בחרו משחק והתחילו בחוויה</p>
    </div>

    <div class="grid-container">
        <!-- המשחק הקיים -->
        <a href="game.html" class="game-card">
            <div class="icon-wrapper">
                <i class="fas fa-gamepad"></i>
            </div>
            <div class="game-title">חיים מוזרים</div>
            <div class="game-desc">רוצים לריב עם האח המעצבן או השכנים? רק תזהרו שלא יתפסו אתכם!</div>
            <div class="btn">שחק עכשיו</div>
        </a>

        <!-- מקום למשחק עתידי -->
        <div class="game-card coming-soon">
            <div class="icon-wrapper">
                <i class="fas fa-lock"></i>
            </div>
            <div class="game-title">בקרוב...</div>
            <div class="game-desc">אנחנו עובדים על חוויות חדשות עבורכם. הישארו מעודכנים!</div>
        </div>
    </div>

</body>
</html>
